<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Break</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="message">Take a quiet break from the exhausted world.</div>
    <script>
      setTimeout(() => {
        const message = document.querySelector('.message');
        if (message) {
          message.classList.add('hidden');
        }
      }, 7000);
    </script>
</body>
</html>
