<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Break</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="message">Take a quiet break from the exhausted world.</div>
    <div class="shortcut-hint">Cmd + Shift + F on Mac<br>Ctrl + Shift + F on Windows/Linux</div>
    <script>
      setTimeout(() => {
        document.querySelectorAll('.message, .shortcut-hint').forEach((element) => {
          element.classList.add('hidden');
        });
      }, 7000);

      document.addEventListener('keydown', async (event) => {
        const isFullscreenShortcut = event.shiftKey && event.key.toLowerCase() === 'f' && (event.metaKey || event.ctrlKey);

        if (!isFullscreenShortcut) {
          return;
        }

        event.preventDefault();

        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (error) {
          console.error('Fullscreen is not available in this browser.', error);
        }
      });
    </script>
</body>
</html>
